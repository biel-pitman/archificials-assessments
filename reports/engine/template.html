<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{CLIENT_NAME}} — AI Readiness Assessment Report</title>
    <meta name="description" content="Confidential AI readiness assessment and recommendations for {{CLIENT_NAME}}">
    
    <!-- reveal.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    
    <style>
        /* ============================================
           Archificials Brand Color Palette
           ============================================ */
        :root {
            --primary: #1a1a2e;
            --primary-light: #2d2d4a;
            --accent: #e27308;
            --accent-hover: #c96407;
            --accent-light: rgba(226, 115, 8, 0.12);
            --bg-light: #f8f9fa;
            --bg-warm: #fefcf9;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-body: #333333;
            --text-light: #6c757d;
            --border: #e0e0e0;
            --border-light: #f0f0f0;
            --success: #28a745;
            --info: #3498db;

            /* Tier Colors */
            --tier-1: #f4c089;
            --tier-2: #f0a050;
            --tier-3: #e27308;
            --tier-4: #a85206;
        }
        
        /* ============================================
           Base Typography & Layout
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--primary);
            color: var(--text-body);
        }
        
        /* ============================================
           Reveal.js Overrides
           ============================================ */
        .reveal {
            width: 100% !important;
            height: 100% !important;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        .reveal .slides {
            width: 100%;
            height: 100%;
            text-align: left;
        }

        .reveal section {
            padding: 50px 60px !important;
            height: 100% !important;
            width: 100% !important;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        
        /* ============================================
           Slide Backgrounds & Layouts
           ============================================ */
        .slide-content {
            background: var(--card);
            color: var(--text-body);
            padding: 50px 60px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            max-width: 1200px;
            width: 100%;
            position: relative;
            text-align: left;
        }

        .slide-content::before {
            content: 'ARCHIFICIALS';
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .slide-divider {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 60%, #16213e 100%) !important;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .slide-divider::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(226,115,8,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .slide-divider h1 {
            color: var(--card);
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 20px;
            position: relative;
            padding-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .slide-divider h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: var(--accent);
            border-radius: 2px;
        }

        .slide-divider p {
            color: rgba(255,255,255,0.7);
            font-size: 20px;
            max-width: 600px;
            text-align: center;
            font-weight: 300;
            line-height: 1.5;
        }

        .slide-divider .section-number {
            position: absolute;
            top: 40px;
            left: 60px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        /* ============================================
           Title Slide
           ============================================ */
        .slide-title {
            background: linear-gradient(135deg, var(--primary) 0%, #0f0f1f 100%) !important;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .slide-title::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -20%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(226,115,8,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .slide-title-content {
            text-align: center;
            color: var(--card);
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .logo-anchor {
            font-size: 13px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .slide-title h1 {
            font-size: 54px;
            font-weight: 800;
            margin: 20px 0;
            color: var(--card);
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .slide-title .subtitle {
            font-size: 26px;
            color: rgba(255,255,255,0.85);
            margin: 20px 0;
            font-weight: 300;
        }

        .slide-title .meta {
            font-size: 15px;
            color: rgba(255,255,255,0.5);
            margin-top: 50px;
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 25px;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .slide-title .meta-item {
            margin: 0;
        }

        .slide-title .meta-label {
            color: var(--accent);
            font-weight: 600;
        }
        
        /* ============================================
           Content Slide Styles
           ============================================ */
        .slide-content h1,
        .slide-content h2 {
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.3px;
        }

        .slide-content h1 {
            font-size: 38px;
        }

        .slide-content h2 {
            font-size: 30px;
            position: relative;
            padding-bottom: 16px;
        }

        .slide-content h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
        }

        .slide-content h3 {
            color: var(--accent);
            font-size: 20px;
            font-weight: 600;
            margin: 20px 0 12px 0;
        }

        .slide-content p {
            color: var(--text-body);
            font-size: 18px;
            line-height: 1.7;
            margin: 12px 0;
        }

        .slide-content li {
            color: var(--text-body);
            font-size: 18px;
            line-height: 1.6;
            margin: 10px 0;
        }

        .slide-content ul,
        .slide-content ol {
            margin-left: 24px;
            margin-top: 16px;
            margin-bottom: 16px;
        }

        .slide-content li {
            margin-bottom: 10px;
            padding-left: 8px;
        }

        .slide-content li::marker {
            color: var(--accent);
            font-weight: 700;
        }
        
        /* ============================================
           Chart Container
           ============================================ */
        .chart-container {
            margin: 24px 0;
            padding: 24px;
            background: var(--bg-warm);
            border-radius: 10px;
            border: 1px solid var(--border-light);
            width: 100%;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .plotly-graph-div {
            width: 100% !important;
            height: 450px !important;
        }

        .chart-source {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 12px;
            border-top: 1px solid var(--border-light);
            padding-top: 10px;
            font-style: italic;
        }

        .source-link {
            color: var(--accent);
            text-decoration: none;
        }

        .source-link:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }
        
        /* ============================================
           Data Display Cards
           ============================================ */
        .score-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 24px 20px;
            margin: 0;
            text-align: center;
            flex: 1;
            min-width: 200px;
            transition: box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .score-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--border);
        }

        .score-card.tier-1::before { background: var(--tier-1); }
        .score-card.tier-2::before { background: var(--tier-2); }
        .score-card.tier-3::before { background: var(--tier-3); }
        .score-card.tier-4::before { background: var(--tier-4); }

        .score-card.tier-1 { border-color: var(--tier-1); }
        .score-card.tier-2 { border-color: var(--tier-2); }
        .score-card.tier-3 { border-color: var(--tier-3); }
        .score-card.tier-4 { border-color: var(--tier-4); }

        .score-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .score-value {
            font-size: 42px;
            font-weight: 800;
            color: var(--primary);
            margin: 8px 0;
            letter-spacing: -1px;
        }

        .score-suffix {
            font-size: 18px;
            font-weight: 400;
            color: var(--text-light);
        }

        .score-tier {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            margin-top: 4px;
        }
        
        /* ============================================
           Grid & Flex Utilities
           ============================================ */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        
        .grid-4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 16px;
            margin: 20px 0;
        }
        
        .flex-row {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }
        
        /* ============================================
           Table Styles
           ============================================ */
        .slide-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: var(--card);
        }
        
        .slide-content table {
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .slide-content th {
            background: var(--primary);
            color: var(--card);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .slide-content td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-light);
            font-size: 15px;
        }

        .slide-content tr:nth-child(even) {
            background: var(--bg-light);
        }
        
        /* ============================================
           CTA & Buttons
           ============================================ */
        .cta-button {
            display: inline-block;
            background: var(--accent);
            color: var(--card);
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            margin: 15px 8px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            letter-spacing: 0.3px;
        }

        .cta-button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(226, 115, 8, 0.3);
        }

        .cta-button.secondary {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }

        .cta-button.secondary:hover {
            background: var(--accent-light);
        }

        /* ============================================
           Scenario Card (special layout)
           ============================================ */
        .scenario-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 24px;
            text-align: left;
        }

        .scenario-card h3 {
            margin: 0 0 8px 0;
            font-size: 18px;
        }

        .scenario-card p {
            font-size: 15px;
            line-height: 1.5;
            margin: 6px 0;
        }

        .scenario-card .cost {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
        }

        .scenario-card.recommended {
            border-color: var(--accent);
            box-shadow: 0 2px 12px rgba(226, 115, 8, 0.1);
        }

        .scenario-card.recommended::before {
            content: 'RECOMMENDED';
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: var(--card);
            background: var(--accent);
            padding: 3px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
            width: fit-content;
            letter-spacing: 1px;
        }
        
        /* ============================================
           Footer (Per-Slide)
           ============================================ */
        .reveal .slide-number {
            background: transparent;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            font-family: 'Inter', sans-serif;
        }

        .slide-footer {
            position: absolute;
            bottom: 16px;
            left: 60px;
            right: 60px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-light);
            pointer-events: none;
            opacity: 0.6;
        }

        /* ============================================
           Insight/Quote Block
           ============================================ */
        .insight-block {
            background: var(--accent-light);
            border-left: 4px solid var(--accent);
            padding: 16px 20px;
            border-radius: 0 8px 8px 0;
            margin: 16px 0;
        }

        .insight-block p {
            font-size: 16px;
            font-style: italic;
            color: var(--text-body);
            margin: 0;
        }

        /* ============================================
           Key Metric Row
           ============================================ */
        .metric-row {
            display: flex;
            gap: 24px;
            margin: 16px 0;
        }

        .metric-item {
            flex: 1;
            text-align: center;
            padding: 16px;
            background: var(--bg-light);
            border-radius: 8px;
        }

        .metric-item .value {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
        }

        .metric-item .label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* ============================================
           Reveal.js Print/PDF Overrides
           ============================================ */
        @media print {
            .reveal section {
                page-break-after: always;
                padding: 40px !important;
            }

            .slide-footer {
                display: none;
            }

            .chart-container {
                page-break-inside: avoid;
            }
        }

        /* ============================================
           Reveal.js Speaker Notes (Hidden)
           ============================================ */
        .notes {
            display: none;
        }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            {{SLIDES_HTML}}
        </div>
    </div>
    
    <!-- Reveal.js -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5"></script>
    
    <!-- Archificials Plotly Chart Utilities -->
    <script>
        {{CHARTS_UTILITIES}}
    </script>
    
    <!-- Initialize Reveal.js -->
    <script>
        Reveal.initialize({
            width: 1920,
            height: 1080,
            margin: 0.04,
            minScale: 0.2,
            maxScale: 2.0,
            hash: true,
            keyboard: true,
            center: true,
            transition: 'slide',
            transitionSpeed: 'default',
            slideNumber: 'c/t',
            overview: true
        });
    </script>
    
    <!-- Chart Data & Population -->
    <script>
        {{CHARTS_JSON}}
    </script>
</body>
</html>
